<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / SSO / Cancel / Danger" viewport="700x130" -->
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .btn{font-family:inherit;font-size:14px;font-weight:600;padding:10px 18px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;line-height:1;}
  .btn-primary{background:#29ABE2;color:#fff;}
  .btn-primary:hover{background:#1E8FBF;}
  .btn-secondary{background:#fff;color:#29ABE2;border-color:#29ABE2;}
  .btn-secondary:hover{background:#E8F7FD;}
  .btn-ghost{background:#fff;color:var(--st-text);border-color:var(--st-border);}
  .btn-ghost:hover{background:#F5F5F5;}
  .btn-danger{background:#fff;color:#F44336;border-color:#F44336;}
  h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--st-text-muted);margin:0 0 12px;font-weight:600;}
</style></head>
<body>
  <h3>Buttons</h3>
  <div class="row">
    <button class="btn btn-primary">Log in</button>
    <button class="btn btn-secondary">Sign in with SSO</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-danger">Delete site</button>
  </div>
</body></html>
