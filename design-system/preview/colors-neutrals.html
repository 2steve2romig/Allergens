<!doctype html>
<!-- @dsCard group="Colors" name="Neutrals" subtitle="White → text primary" viewport="700x170" -->
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{border-radius:8px;overflow:hidden;border:1px solid var(--st-border);}
  .chip{height:76px;}
  .meta{padding:8px 10px;}
  .meta .name{font-size:12px;font-weight:600;color:var(--st-text);}
  .meta .hex{font-family:var(--font-mono);font-size:11px;color:var(--st-text-muted);margin-top:2px;}
  h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--st-text-muted);margin:0 0 10px;font-weight:600;}
</style></head>
<body>
  <h3>Neutrals</h3>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#F5F5F5"></div><div class="meta"><div class="name">Page bg</div><div class="hex">#F5F5F5</div></div></div>
    <div class="sw"><div class="chip" style="background:#E0E0E0"></div><div class="meta"><div class="name">Border</div><div class="hex">#E0E0E0</div></div></div>
    <div class="sw"><div class="chip" style="background:#757575"></div><div class="meta"><div class="name">Text muted</div><div class="hex">#757575</div></div></div>
    <div class="sw"><div class="chip" style="background:#1A1A1A"></div><div class="meta"><div class="name">Text primary</div><div class="hex">#1A1A1A</div></div></div>
  </div>
</body></html>
