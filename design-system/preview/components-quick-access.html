<!doctype html>
<!-- @dsCard group="Components" name="Quick-access cards" subtitle="Scale on hover" viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Quick-access cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 20px;background:#fff;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(5,88px);gap:14px;}
  .card{text-align:center;cursor:pointer;transition:transform .18s ease, box-shadow .18s ease;padding:6px 4px;border-radius:10px;}
  .card:hover{transform:scale(1.06);box-shadow:0 4px 14px rgba(13,106,153,.12);}
  .card:active{transform:scale(1.02);}
  .icon{width:56px;height:56px;border-radius:8px;border:1.5px solid;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;background:#fff;}
  .lbl{font-size:12px;color:var(--st-text);}
  h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--st-text-muted);margin:0 0 12px;font-weight:600;}
  svg{width:22px;height:22px;}
</style></head>
<body>
  <h3>Quick-access icon cards</h3>
  <div class="grid">
    <div class="card">
      <div class="icon" style="border-color:#E8662A;color:#E8662A">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      </div><div class="lbl">Register</div>
    </div>
    <div class="card">
      <div class="icon" style="border-color:#29ABE2;color:#29ABE2">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
      </div><div class="lbl">User mgmt</div>
    </div>
    <div class="card">
      <div class="icon" style="border-color:#5B4FA8;color:#5B4FA8">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </div><div class="lbl">Import</div>
    </div>
    <div class="card">
      <div class="icon" style="border-color:#5B4FA8;color:#5B4FA8">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h14M13 6l6 6-6 6"/></svg>
      </div><div class="lbl">Migrate</div>
    </div>
    <div class="card">
      <div class="icon" style="border-color:#2196A8;color:#2196A8">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>
      </div><div class="lbl">Tutorials</div>
    </div>
  </div>
</body></html>
