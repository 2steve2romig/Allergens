<!doctype html>
<!-- @dsCard group="Colors" name="Semantic colors" subtitle="Pass / Fail / Caution" viewport="700x170" -->
<html><head><meta charset="utf-8"><title>Semantic palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .sw{border-radius:8px;overflow:hidden;border:1px solid var(--st-border);}
  .chip{height:76px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;}
  .meta{padding:8px 10px;}
  .meta .name{font-size:12px;font-weight:600;color:var(--st-text);}
  .meta .hex{font-family:var(--font-mono);font-size:11px;color:var(--st-text-muted);margin-top:2px;}
  h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--st-text-muted);margin:0 0 10px;font-weight:600;}
</style></head>
<body>
  <h3>Semantic — pass / fail / caution</h3>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#4CAF50">Pass</div><div class="meta"><div class="name">Success</div><div class="hex">#4CAF50</div></div></div>
    <div class="sw"><div class="chip" style="background:#F44336">Fail</div><div class="meta"><div class="name">Error</div><div class="hex">#F44336</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFC107;color:#4a3500">Caution</div><div class="meta"><div class="name">Warn</div><div class="hex">#FFC107</div></div></div>
  </div>
</body></html>
