<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4 / 8 / 12 / 16 / 24 / 32 / 48" viewport="700x150" -->
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 20px;background:#fff;font-family:var(--font-sans);}
  .scale{display:flex;align-items:flex-end;gap:18px;}
  .item{text-align:center;}
  .box{background:#29ABE2;border-radius:3px;}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--st-text-muted);margin-top:6px;}
  h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--st-text-muted);margin:0 0 14px;font-weight:600;}
</style></head>
<body>
  <h3>Spacing scale</h3>
  <div class="scale">
    <div class="item"><div class="box" style="width:4px;height:4px"></div><div class="lbl">4</div></div>
    <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="lbl">8</div></div>
    <div class="item"><div class="box" style="width:12px;height:12px"></div><div class="lbl">12</div></div>
    <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="lbl">16</div></div>
    <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="lbl">24</div></div>
    <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="lbl">32</div></div>
    <div class="item"><div class="box" style="width:48px;height:48px"></div><div class="lbl">48</div></div>
  </div>
</body></html>
