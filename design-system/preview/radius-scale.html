<!doctype html>
<!-- @dsCard group="Spacing" name="Border radius" subtitle="0 / 4 / 6 / 8 / pill" viewport="700x160" -->
<html><head><meta charset="utf-8"><title>Radius scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .box{width:60px;height:60px;background:#E8F7FD;border:1.5px solid #29ABE2;}
  .pill{width:90px;height:40px;background:#E8F7FD;border:1.5px solid #29ABE2;border-radius:999px;}
  .col{text-align:center;}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--st-text-muted);margin-top:8px;}
  h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--st-text-muted);margin:0 0 14px;font-weight:600;}
</style></head>
<body>
  <h3>Border radius</h3>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:0"></div><div class="lbl">0 · table cells</div></div>
    <div class="col"><div class="box" style="border-radius:4px"></div><div class="lbl">4 · inputs</div></div>
    <div class="col"><div class="box" style="border-radius:6px"></div><div class="lbl">6 · nav items</div></div>
    <div class="col"><div class="box" style="border-radius:8px"></div><div class="lbl">8 · cards</div></div>
    <div class="col"><div class="pill"></div><div class="lbl">pill · badges</div></div>
  </div>
</body></html>
