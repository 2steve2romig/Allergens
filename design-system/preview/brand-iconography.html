<!doctype html>
<!-- @dsCard group="Brand" name="Iconography" subtitle="Lucide, 1.5–2px stroke" viewport="700x150" -->
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .ic{width:44px;height:44px;border-radius:8px;border:1.5px solid var(--st-border);display:flex;align-items:center;justify-content:center;color:var(--st-text);}
  .ic svg{width:22px;height:22px;}
  .note{font-size:12px;color:var(--st-text-muted);max-width:280px;line-height:1.6;}
  h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--st-text-muted);margin:0 0 12px;font-weight:600;}
</style></head>
<body>
  <h3>Iconography — Lucide, 1.5–2px stroke</h3>
  <div class="row">
    <div class="ic" style="color:#29ABE2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
    <div class="ic" style="color:#29ABE2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></div>
    <div class="ic" style="color:#29ABE2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></div>
    <div class="ic" style="color:#29ABE2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg></div>
    <div class="ic" style="color:#5B4FA8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 22s7-7 7-12a7 7 0 0 0-14 0c0 5 7 12 7 12z"/></svg></div>
    <div class="ic" style="color:#E8662A"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></div>
    <div class="note">System: <b>Lucide</b> via CDN. 1.5–2px stroke, 24×24 box, round line caps. Inherit <code>currentColor</code>.</div>
  </div>
</body></html>
