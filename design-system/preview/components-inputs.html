<!doctype html>
<!-- @dsCard group="Components" name="Form inputs" subtitle="Text field + select" viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 20px;background:#fff;font-family:var(--font-sans);}
  .field{margin-bottom:12px;max-width:360px;}
  label{display:block;font-size:12px;color:var(--st-text-muted);margin-bottom:4px;}
  .in,.sel{width:100%;box-sizing:border-box;font-family:inherit;font-size:14px;padding:9px 12px;border-radius:4px;border:1px solid var(--st-border);background:#E8F7FD;color:var(--st-text);}
  .sel{background:#fff;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%23757575' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px;}
  .in:focus,.sel:focus{outline:none;border-color:#29ABE2;box-shadow:0 0 0 3px rgba(41,171,226,.25);}
  h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--st-text-muted);margin:0 0 12px;font-weight:600;}
</style></head>
<body>
  <h3>Form inputs</h3>
  <div class="field"><label>Username</label><input class="in" value="rsilverbergdev"></div>
  <div class="field"><label>Test type</label><select class="sel"><option>ATP</option><option>Allergen</option><option>Coliform</option></select></div>
</body></html>
