<!doctype html>
<!-- @dsCard group="Colors" name="Primary blues" subtitle="Sky / Deep / Nav / Tint" viewport="700x170" -->
<html><head><meta charset="utf-8"><title>Primary palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border-radius:8px;overflow:hidden;border:1px solid var(--st-border);}
  .chip{height:84px;}
  .meta{padding:8px 10px;background:#fff;}
  .meta .name{font-size:12px;font-weight:600;color:var(--st-text);}
  .meta .hex{font-family:var(--font-mono);font-size:11px;color:var(--st-text-muted);margin-top:2px;}
  h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--st-text-muted);margin:0 0 10px;font-weight:600;}
</style></head>
<body>
  <h3>Primary blues</h3>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#29ABE2"></div><div class="meta"><div class="name">Sky blue</div><div class="hex">#29ABE2</div></div></div>
    <div class="sw"><div class="chip" style="background:#1E8FBF"></div><div class="meta"><div class="name">Deep blue</div><div class="hex">#1E8FBF</div></div></div>
    <div class="sw"><div class="chip" style="background:#0D6A99"></div><div class="meta"><div class="name">Nav blue</div><div class="hex">#0D6A99</div></div></div>
    <div class="sw"><div class="chip" style="background:#E8F7FD"></div><div class="meta"><div class="name">Blue tint</div><div class="hex">#E8F7FD</div></div></div>
  </div>
</body></html>
